[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
# E/W: pycodestyle, F: pyflakes, I: isort, UP: pyupgrade
select = ["E", "F", "W", "I", "UP"]
ignore = [
    "E501",  # line too long – handled by formatter, not linter
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F401"]  # imported but unused (test helpers)
