blueprint:
  name: "Tado X Proxy – Preset-Zeitplan"
  description: >
    Automatischer Preset-Zeitplan für einen Tado X Proxy Thermostaten.


    Steuert drei Phasen pro Tag:

    - ☀️ Morgens → wählbares Preset (Standard: Komfort)

    - 🌅 Abends → wählbares Preset (Standard: Eco)

    - 🌙 Nachts → wählbares Preset (Standard: Frostschutz)


    Werktag- und Wochenend-Zeiten sind getrennt konfigurierbar.

    Importiere diesen Blueprint **einmal pro Raum**.


    Beim HA-Neustart wird automatisch das zur aktuellen Uhrzeit
    passende Preset gesetzt (Startup-Sync).
  domain: automation
  author: "kinimodb"
  source_url: "https://github.com/kinimodb/ha-tadox-proxy/blob/main/blueprints/automation/kinimodb/tadox_proxy_zeitplan.yaml"

  input:
    # ── Thermostat ──
    thermostat:
      name: "Proxy-Thermostat"
      description: "Der Tado X Proxy Thermostat für diesen Raum."
      selector:
        entity:
          filter:
            - domain: climate

    # ── Presets ──
    preset_morgens:
      name: "Preset – Morgens"
      description: "Welches Preset morgens aktiviert werden soll."
      default: "comfort"
      selector:
        select:
          options:
            - label: "Komfort"
              value: "comfort"
            - label: "Eco"
              value: "eco"
            - label: "Boost"
              value: "boost"
            - label: "Abwesend"
              value: "away"
            - label: "Frostschutz"
              value: "frost"

    preset_abends:
      name: "Preset – Abends"
      description: "Welches Preset abends aktiviert werden soll."
      default: "eco"
      selector:
        select:
          options:
            - label: "Komfort"
              value: "comfort"
            - label: "Eco"
              value: "eco"
            - label: "Boost"
              value: "boost"
            - label: "Abwesend"
              value: "away"
            - label: "Frostschutz"
              value: "frost"

    preset_nachts:
      name: "Preset – Nachts"
      description: "Welches Preset nachts aktiviert werden soll."
      default: "frost"
      selector:
        select:
          options:
            - label: "Komfort"
              value: "comfort"
            - label: "Eco"
              value: "eco"
            - label: "Boost"
              value: "boost"
            - label: "Abwesend"
              value: "away"
            - label: "Frostschutz"
              value: "frost"

    # ── Zeiten: Werktag (Mo–Fr) ──
    zeit_morgens_werktag:
      name: "⏰ Morgens – Werktag"
      description: "Startzeit Morgen-Preset an Werktagen."
      default: "06:30:00"
      selector:
        time:

    zeit_abends_werktag:
      name: "⏰ Abends – Werktag"
      description: "Startzeit Abend-Preset an Werktagen."
      default: "21:00:00"
      selector:
        time:

    zeit_nachts_werktag:
      name: "⏰ Nachts – Werktag"
      description: "Startzeit Nacht-Preset an Werktagen."
      default: "23:00:00"
      selector:
        time:

    # ── Zeiten: Wochenende (Sa–So) ──
    zeit_morgens_wochenende:
      name: "⏰ Morgens – Wochenende"
      description: "Startzeit Morgen-Preset am Wochenende."
      default: "08:00:00"
      selector:
        time:

    zeit_abends_wochenende:
      name: "⏰ Abends – Wochenende"
      description: "Startzeit Abend-Preset am Wochenende."
      default: "22:00:00"
      selector:
        time:

    zeit_nachts_wochenende:
      name: "⏰ Nachts – Wochenende"
      description: "Startzeit Nacht-Preset am Wochenende."
      default: "00:00:00"
      selector:
        time:

# ════════════════════════════════════════════════════════════════════════════
#  Trigger
# ════════════════════════════════════════════════════════════════════════════

trigger:
  - trigger: time
    at: !input zeit_morgens_werktag
    id: "morgens_werktag"
  - trigger: time
    at: !input zeit_abends_werktag
    id: "abends_werktag"
  - trigger: time
    at: !input zeit_nachts_werktag
    id: "nachts_werktag"
  - trigger: time
    at: !input zeit_morgens_wochenende
    id: "morgens_wochenende"
  - trigger: time
    at: !input zeit_abends_wochenende
    id: "abends_wochenende"
  - trigger: time
    at: !input zeit_nachts_wochenende
    id: "nachts_wochenende"
  - trigger: homeassistant
    event: start
    id: "startup"

# ════════════════════════════════════════════════════════════════════════════
#  Variablen (für Startup-Logik)
# ════════════════════════════════════════════════════════════════════════════

variables:
  p_morgens: !input preset_morgens
  p_abends: !input preset_abends
  p_nachts: !input preset_nachts
  zt_morgens_wd: !input zeit_morgens_werktag
  zt_abends_wd: !input zeit_abends_werktag
  zt_nachts_wd: !input zeit_nachts_werktag
  zt_morgens_we: !input zeit_morgens_wochenende
  zt_abends_we: !input zeit_abends_wochenende
  zt_nachts_we: !input zeit_nachts_wochenende

# ════════════════════════════════════════════════════════════════════════════
#  Action
# ════════════════════════════════════════════════════════════════════════════

action:
  - choose:
      # ── Morgens Werktag ──
      - conditions:
          - condition: trigger
            id: "morgens_werktag"
          - condition: time
            weekday: [mon, tue, wed, thu, fri]
        sequence:
          - action: climate.set_preset_mode
            target:
              entity_id: !input thermostat
            data:
              preset_mode: !input preset_morgens

      # ── Abends Werktag ──
      - conditions:
          - condition: trigger
            id: "abends_werktag"
          - condition: time
            weekday: [mon, tue, wed, thu, fri]
        sequence:
          - action: climate.set_preset_mode
            target:
              entity_id: !input thermostat
            data:
              preset_mode: !input preset_abends

      # ── Nachts Werktag ──
      - conditions:
          - condition: trigger
            id: "nachts_werktag"
          - condition: time
            weekday: [mon, tue, wed, thu, fri]
        sequence:
          - action: climate.set_preset_mode
            target:
              entity_id: !input thermostat
            data:
              preset_mode: !input preset_nachts

      # ── Morgens Wochenende ──
      - conditions:
          - condition: trigger
            id: "morgens_wochenende"
          - condition: time
            weekday: [sat, sun]
        sequence:
          - action: climate.set_preset_mode
            target:
              entity_id: !input thermostat
            data:
              preset_mode: !input preset_morgens

      # ── Abends Wochenende ──
      - conditions:
          - condition: trigger
            id: "abends_wochenende"
          - condition: time
            weekday: [sat, sun]
        sequence:
          - action: climate.set_preset_mode
            target:
              entity_id: !input thermostat
            data:
              preset_mode: !input preset_abends

      # ── Nachts Wochenende ──
      - conditions:
          - condition: trigger
            id: "nachts_wochenende"
          - condition: time
            weekday: [sat, sun]
        sequence:
          - action: climate.set_preset_mode
            target:
              entity_id: !input thermostat
            data:
              preset_mode: !input preset_nachts

      # ── Startup-Sync ──
      - conditions:
          - condition: trigger
            id: "startup"
        sequence:
          - delay:
              seconds: 30
          - action: climate.set_preset_mode
            target:
              entity_id: !input thermostat
            data:
              preset_mode: >
                {% set t = now().strftime('%H:%M:%S') %}
                {% set wd = now().isoweekday() <= 5 %}
                {% set tm = zt_morgens_wd if wd else zt_morgens_we %}
                {% set ta = zt_abends_wd if wd else zt_abends_we %}
                {% set tn = zt_nachts_wd if wd else zt_nachts_we %}
                {% if tn > tm %}
                  {% if t >= tn or t < tm %}{{ p_nachts }}
                  {% elif t >= ta %}{{ p_abends }}
                  {% else %}{{ p_morgens }}
                  {% endif %}
                {% else %}
                  {% if t < tm %}{{ p_nachts }}
                  {% elif t >= ta %}{{ p_abends }}
                  {% else %}{{ p_morgens }}
                  {% endif %}
                {% endif %}

mode: single
