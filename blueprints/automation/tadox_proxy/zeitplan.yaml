# ════════════════════════════════════════════════════════════════════════════
#  Trigger
# ════════════════════════════════════════════════════════════════════════════

trigger:
  # Main times (all days, or weekdays only when separate weekend times)
  - trigger: time
    at: !input zeit_morgens
    id: "morgens"
  - trigger: time
    at: !input zeit_mittags
    id: "mittags"
  - trigger: time
    at: !input zeit_abends
    id: "abends"
  - trigger: time
    at: !input zeit_nachts
    id: "nachts"
  # Weekend times (only used when separate weekend times enabled)
  - trigger: time
    at: !input zeit_morgens_we
    id: "morgens_we"
  - trigger: time
    at: !input zeit_mittags_we
    id: "mittags_we"
  - trigger: time
    at: !input zeit_abends_we
    id: "abends_we"
  - trigger: time
    at: !input zeit_nachts_we
    id: "nachts_we"
  # Startup sync
  - trigger: homeassistant
    event: start
    id: "startup"

# ════════════════════════════════════════════════════════════════════════════
#  Variables
# ════════════════════════════════════════════════════════════════════════════

variables:
  # Settings
  sep_zeiten: !input separate_wochenend_zeiten
  sep_presets: !input separate_wochenend_presets
  # Main times
  zt_morgens: !input zeit_morgens
  zt_mittags: !input zeit_mittags
  zt_abends: !input zeit_abends
  zt_nachts: !input zeit_nachts
  # Weekend times
  zt_morgens_we: !input zeit_morgens_we
  zt_mittags_we: !input zeit_mittags_we
  zt_abends_we: !input zeit_abends_we
  zt_nachts_we: !input zeit_nachts_we
  # Main presets
  mo_morgens: !input modus_morgens
  mo_mittags: !input modus_mittags
  mo_abends: !input modus_abends
  mo_nachts: !input modus_nachts
  pr_morgens: !input preset_morgens
  pr_mittags: !input preset_mittags
  pr_abends: !input preset_abends
  pr_nachts: !input preset_nachts
  tp_morgens: !input temp_morgens
  tp_mittags: !input temp_mittags
  tp_abends: !input temp_abends
  tp_nachts: !input temp_nachts
  # Weekend presets
  mo_morgens_we: !input modus_morgens_we
  mo_mittags_we: !input modus_mittags_we
  mo_abends_we: !input modus_abends_we
  mo_nachts_we: !input modus_nachts_we
  pr_morgens_we: !input preset_morgens_we
  pr_mittags_we: !input preset_mittags_we
  pr_abends_we: !input preset_abends_we
  pr_nachts_we: !input preset_nachts_we
  tp_morgens_we: !input temp_morgens_we
  tp_mittags_we: !input temp_mittags_we
  tp_abends_we: !input temp_abends_we
  tp_nachts_we: !input temp_nachts_we

# ════════════════════════════════════════════════════════════════════════════
#  Action
# ════════════════════════════════════════════════════════════════════════════

action:
  - variables:
      tid: "{{ trigger.id }}"
      is_we: "{{ now().isoweekday() > 5 }}"
      # Check if this trigger should fire today
      valid: >
        {% if tid == 'startup' %}
          true
        {% elif tid.endswith('_we') %}
          {{ sep_zeiten and is_we }}
        {% else %}
          {{ (not sep_zeiten) or (not is_we) }}
        {% endif %}
      # Determine which slot this trigger belongs to
      slot: >
        {% if tid == 'startup' %}
          startup
        {% elif tid.endswith('_we') %}
          {{ tid[:-3] }}
        {% else %}
          {{ tid }}
        {% endif %}
      # Whether to use weekend presets for this activation
      use_we_p: "{{ sep_presets and is_we }}"

  - condition: template
    value_template: "{{ valid }}"

  - choose:
      # ────────────────────────────────────────────────────────
      #  Startup-Sync
      # ────────────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ tid == 'startup' }}"
        sequence:
          - delay:
              seconds: 30
          - variables:
              # Determine currently active slot based on time of day
              use_we_t: "{{ sep_zeiten and is_we }}"
              startup_slot: >
                {% set t = now().strftime('%H:%M:%S') %}
                {% set tm  = zt_morgens_we  if use_we_t else zt_morgens %}
                {% set tmi = zt_mittags_we  if use_we_t else zt_mittags %}
                {% set ta  = zt_abends_we   if use_we_t else zt_abends %}
                {% set tn  = zt_nachts_we   if use_we_t else zt_nachts %}
                {% set slots = [
                  {'time': tm,  'name': 'morgens'},
                  {'time': tmi, 'name': 'mittags'},
                  {'time': ta,  'name': 'abends'},
                  {'time': tn,  'name': 'nachts'}
                ] %}
                {% set sorted_slots = slots | sort(attribute='time') %}
                {% set ns = namespace(name=sorted_slots[-1].name) %}
                {% for s in sorted_slots %}
                  {% if t >= s.time %}{% set ns.name = s.name %}{% endif %}
                {% endfor %}
                {{ ns.name }}
              startup_mode: >
                {% set uwp = sep_presets and is_we %}
                {% set modes = {
                  'morgens': mo_morgens_we if uwp else mo_morgens,
                  'mittags': mo_mittags_we if uwp else mo_mittags,
                  'abends':  mo_abends_we  if uwp else mo_abends,
                  'nachts':  mo_nachts_we  if uwp else mo_nachts
                } %}
                {{ modes[startup_slot] }}
              startup_preset: >
                {% set uwp = sep_presets and is_we %}
                {% set presets = {
                  'morgens': pr_morgens_we if uwp else pr_morgens,
                  'mittags': pr_mittags_we if uwp else pr_mittags,
                  'abends':  pr_abends_we  if uwp else pr_abends,
                  'nachts':  pr_nachts_we  if uwp else pr_nachts
                } %}
                {{ presets[startup_slot] }}
              startup_temp: >
                {% set uwp = sep_presets and is_we %}
                {% set temps = {
                  'morgens': tp_morgens_we if uwp else tp_morgens,
                  'mittags': tp_mittags_we if uwp else tp_mittags,
                  'abends':  tp_abends_we  if uwp else tp_abends,
                  'nachts':  tp_nachts_we  if uwp else tp_nachts
                } %}
                {{ temps[startup_slot] }}
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ startup_mode == 'preset' }}"
                sequence:
                  - action: climate.set_preset_mode
                    target:
                      entity_id: !input thermostat
                    data:
                      preset_mode: "{{ startup_preset }}"
            default:
              - action: climate.set_temperature
                target:
                  entity_id: !input thermostat
                data:
                  temperature: "{{ startup_temp | float }}"

    # ────────────────────────────────────────────────────────
    #  Normal time triggers
    # ────────────────────────────────────────────────────────
    default:
      - variables:
          active_mode: >
            {% set modes = {
              'morgens': mo_morgens_we if use_we_p else mo_morgens,
              'mittags': mo_mittags_we if use_we_p else mo_mittags,
              'abends':  mo_abends_we  if use_we_p else mo_abends,
              'nachts':  mo_nachts_we  if use_we_p else mo_nachts
            } %}
            {{ modes[slot] }}
          active_preset: >
            {% set presets = {
              'morgens': pr_morgens_we if use_we_p else pr_morgens,
              'mittags': pr_mittags_we if use_we_p else pr_mittags,
              'abends':  pr_abends_we  if use_we_p else pr_abends,
              'nachts':  pr_nachts_we  if use_we_p else pr_nachts
            } %}
            {{ presets[slot] }}
          active_temp: >
            {% set temps = {
              'morgens': tp_morgens_we if use_we_p else tp_morgens,
              'mittags': tp_mittags_we if use_we_p else tp_mittags,
              'abends':  tp_abends_we  if use_we_p else tp_abends,
              'nachts':  tp_nachts_we  if use_we_p else tp_nachts
            } %}
            {{ temps[slot] }}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ active_mode == 'preset' }}"
            sequence:
              - action: climate.set_preset_mode
                target:
                  entity_id: !input thermostat
                data:
                  preset_mode: "{{ active_preset }}"
        default:
          - action: climate.set_temperature
            target:
              entity_id: !input thermostat
            data:
              temperature: "{{ active_temp | float }}"

mode: single
