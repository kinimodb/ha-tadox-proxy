              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

    # ══════════════════════════════════════════════════════════════════════
    #  🔀 Wochenend-Presets (optional)
    # ══════════════════════════════════════════════════════════════════════
    section_wochenend_presets:
      name: "🔀 Wochenend-Presets"
      description: "Nur relevant wenn 'Getrennte Wochenend-Presets' aktiviert ist. Ansonsten gelten die Hauptpresets für alle Tage."
      collapsed: true
      input:
        modus_morgens_we:
          name: "☀️ Morgens – Steuerungsart"
          default: "preset"
          selector:
            select:
              options:
                - label: "Preset"
                  value: "preset"
                - label: "Temperatur"
                  value: "temperatur"

        preset_morgens_we:
          name: "☀️ Morgens – Preset"
          default: "comfort"
          selector:
            select:
              options:
                - label: "Komfort"
                  value: "comfort"
                - label: "Eco"
