blueprint:
  name: "Tado X Proxy – Zeitplan"
  description: >
    Automatischer Preset-Zeitplan für einen Tado X Proxy Thermostaten.


    Vier Phasen pro Tag:

    - ☀️ Morgens → Standard: Komfort

    - 🌤️ Mittags → Standard: Komfort

    - 🌅 Abends → Standard: Eco

    - 🌙 Nachts → Standard: Frostschutz


    Pro Phase wählbar: **Preset** oder **individuelle Temperatur**.


    Optional: Getrennte Zeiten und/oder Presets für Wochenende (Sa–So).

    Importiere diesen Blueprint **einmal pro Raum**.


    Beim HA-Neustart wird automatisch das zur aktuellen Uhrzeit
    passende Preset/Temperatur gesetzt (Startup-Sync).
  domain: automation
  author: "kinimodb"
  source_url: "https://github.com/kinimodb/ha-tadox-proxy/blob/main/blueprints/automation/tadox_proxy/zeitplan.yaml"

  input:
    # ── Thermostat ──
    thermostat:
      name: "Proxy-Thermostat"
      description: "Der Tado X Proxy Thermostat für diesen Raum."
      selector:
        entity:
          filter:
            - domain: climate

    # ── Einstellungen ──
    einstellungen:
      name: "⚙️ Einstellungen"
      description: "Optionale Flexibilität für Wochenend-Konfiguration."
      input:
        separate_wochenend_zeiten:
          name: "Getrennte Wochenend-Zeiten"
          description: >
            Aktivieren, um am Wochenende (Sa–So) andere Startzeiten zu nutzen.
            Wenn deaktiviert, gelten die Hauptzeiten für alle Tage.
          default: false
          selector:
            boolean:

        separate_wochenend_presets:
          name: "Getrennte Wochenend-Presets"
          description: >
            Aktivieren, um am Wochenende andere Presets/Temperaturen zu nutzen.
            Wenn deaktiviert, gelten die Hauptpresets für alle Tage.
            Konfiguration unter '🔀 Wochenend-Presets'.
          default: false
          selector:
            boolean:

    # ══════════════════════════════════════════════════════════════════════
    #  ☀️ Morgens
    # ══════════════════════════════════════════════════════════════════════
    section_morgens:
      name: "☀️ Morgens"
      input:
        zeit_morgens:
          name: "Startzeit"
          description: "Startzeit der Morgenphase (gilt für alle Tage, oder nur Werktage wenn getrennte Wochenend-Zeiten aktiv)."
          default: "06:30:00"
          selector:
            time:

        zeit_morgens_we:
          name: "Startzeit – Wochenende"
          description: "Nur relevant wenn 'Getrennte Wochenend-Zeiten' aktiviert ist."
          default: "08:00:00"
          selector:
            time:

        modus_morgens:
          name: "Steuerungsart"
          description: "'Preset' nutzt ein vordefiniertes Preset, 'Temperatur' setzt eine individuelle Zieltemperatur."
          default: "preset"
          selector:
            select:
              options:
                - label: "Preset"
                  value: "preset"
                - label: "Temperatur"
                  value: "temperatur"

        preset_morgens:
          name: "Preset"
          description: "Welches Preset morgens aktiviert werden soll. Nur relevant bei Steuerungsart 'Preset'."
          default: "comfort"
          selector:
            select:
              options:
                - label: "Komfort"
                  value: "comfort"
                - label: "Eco"
                  value: "eco"
                - label: "Boost"
                  value: "boost"
                - label: "Abwesend"
                  value: "away"
                - label: "Frostschutz"
                  value: "frost_protection"

        temp_morgens:
          name: "Zieltemperatur"
          description: "Individuelle Zieltemperatur. Nur relevant bei Steuerungsart 'Temperatur'."
          default: 21.0
          selector:
            number:
              min: 5.0
              max: 30.0
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

    # ══════════════════════════════════════════════════════════════════════
    #  🌤️ Mittags
    # ══════════════════════════════════════════════════════════════════════
    section_mittags:
      name: "🌤️ Mittags"
      input:
        zeit_mittags:
          name: "Startzeit"
          description: "Startzeit der Mittagsphase."
          default: "12:00:00"
          selector:
            time:

        zeit_mittags_we:
          name: "Startzeit – Wochenende"
          description: "Nur relevant wenn 'Getrennte Wochenend-Zeiten' aktiviert ist."
          default: "12:00:00"
          selector:
            time:

        modus_mittags:
          name: "Steuerungsart"
          description: "'Preset' nutzt ein vordefiniertes Preset, 'Temperatur' setzt eine individuelle Zieltemperatur."
          default: "preset"
          selector:
            select:
              options:
                - label: "Preset"
                  value: "preset"
                - label: "Temperatur"
                  value: "temperatur"

        preset_mittags:
          name: "Preset"
          description: "Welches Preset mittags aktiviert werden soll. Nur relevant bei Steuerungsart 'Preset'."
          default: "comfort"
          selector:
            select:
              options:
                - label: "Komfort"
                  value: "comfort"
                - label: "Eco"
                  value: "eco"
                - label: "Boost"
                  value: "boost"
                - label: "Abwesend"
                  value: "away"
                - label: "Frostschutz"
                  value: "frost_protection"

        temp_mittags:
          name: "Zieltemperatur"
          description: "Individuelle Zieltemperatur. Nur relevant bei Steuerungsart 'Temperatur'."
          default: 21.0
          selector:
            number:
              min: 5.0
              max: 30.0
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

    # ══════════════════════════════════════════════════════════════════════
    #  🌅 Abends
    # ══════════════════════════════════════════════════════════════════════
    section_abends:
      name: "🌅 Abends"
      input:
        zeit_abends:
          name: "Startzeit"
          description: "Startzeit der Abendphase."
          default: "18:00:00"
          selector:
            time:

        zeit_abends_we:
          name: "Startzeit – Wochenende"
          description: "Nur relevant wenn 'Getrennte Wochenend-Zeiten' aktiviert ist."
          default: "18:00:00"
          selector:
            time:

        modus_abends:
          name: "Steuerungsart"
          description: "'Preset' nutzt ein vordefiniertes Preset, 'Temperatur' setzt eine individuelle Zieltemperatur."
          default: "preset"
          selector:
            select:
              options:
                - label: "Preset"
                  value: "preset"
                - label: "Temperatur"
                  value: "temperatur"

        preset_abends:
          name: "Preset"
          description: "Welches Preset abends aktiviert werden soll. Nur relevant bei Steuerungsart 'Preset'."
          default: "eco"
          selector:
            select:
              options:
                - label: "Komfort"
                  value: "comfort"
                - label: "Eco"
                  value: "eco"
                - label: "Boost"
                  value: "boost"
                - label: "Abwesend"
                  value: "away"
                - label: "Frostschutz"
                  value: "frost_protection"

        temp_abends:
          name: "Zieltemperatur"
          description: "Individuelle Zieltemperatur. Nur relevant bei Steuerungsart 'Temperatur'."
          default: 19.0
          selector:
            number:
              min: 5.0
              max: 30.0
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

    # ══════════════════════════════════════════════════════════════════════
    #  🌙 Nachts
    # ══════════════════════════════════════════════════════════════════════
    section_nachts:
      name: "🌙 Nachts"
      input:
        zeit_nachts:
          name: "Startzeit"
          description: "Startzeit der Nachtphase."
          default: "23:00:00"
          selector:
            time:

        zeit_nachts_we:
          name: "Startzeit – Wochenende"
          description: "Nur relevant wenn 'Getrennte Wochenend-Zeiten' aktiviert ist."
          default: "00:00:00"
          selector:
            time:

        modus_nachts:
          name: "Steuerungsart"
          description: "'Preset' nutzt ein vordefiniertes Preset, 'Temperatur' setzt eine individuelle Zieltemperatur."
          default: "preset"
