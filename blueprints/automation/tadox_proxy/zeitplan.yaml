    # ══════════════════════════════════════════════════════════════════════
    #  🔀 Wochenend-Presets (optional)
    # ══════════════════════════════════════════════════════════════════════
    section_wochenend_presets:
      name: "🔀 Wochenend-Presets"
      description: "Nur relevant wenn 'Getrennte Wochenend-Presets' aktiviert ist. Ansonsten gelten die Hauptpresets für alle Tage."
      collapsed: true
      input:
        modus_morgens_we:
          name: "☀️ Morgens – Steuerungsart"
          default: "preset"
          selector:
            select:
              options:
                - label: "Preset"
                  value: "preset"
                - label: "Temperatur"
