        preset_nachts:
          name: "Preset"
          description: "Welches Preset nachts aktiviert werden soll. Nur relevant bei Steuerungsart 'Preset'."
          default: "frost_protection"
          selector:
            select:
              options:
                - label: "Komfort"
                  value: "comfort"
                - label: "Eco"
                  value: "eco"
                - label: "Boost"
                  value: "boost"
                - label: "Abwesend"
                  value: "away"
